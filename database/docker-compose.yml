services:
  postgres:
    image: postgres:16
    container_name: wb_niche_postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:7777:5432"
    environment:
      POSTGRES_DB: wb_niche_analysis
      POSTGRES_USER: wb_niche
      POSTGRES_PASSWORD: wb_niche_local
    volumes:
      - wb_niche_postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wb_niche -d wb_niche_analysis"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  wb_niche_postgres_data:
